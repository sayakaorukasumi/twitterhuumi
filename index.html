<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ふみ — プライベートSNS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="private-banner">
    🔒 これはあなただけが見られるプライベートSNSです。外部には公開されません。
  </div>

  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">🐦</span>
        <span class="logo-text">ふみ</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-view="home">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">ホーム</span>
        </a>
        <a href="#" class="nav-item" data-view="notifs">
          <span class="nav-icon-cell">
            <span class="nav-icon">🔔</span>
            <span class="nav-badge" id="notif-badge" style="display:none"></span>
          </span>
          <span class="nav-label">通知</span>
        </a>
        <a href="#" class="nav-item" data-view="settings">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label">プロフィール</span>
        </a>
      </nav>
      <div class="character-status">
        <div class="char-status-title">今日のメンバー</div>
        <div class="char-status-item kaoru">
          <div class="char-av kaoru-bg" id="sidebar-kaoru">🌸</div>
          <div>
            <div class="char-name">薫</div>
            <div class="char-status-text">やさしく見守り中</div>
          </div>
        </div>
        <div class="char-status-item kasumi">
          <div class="char-av kasumi-bg" id="sidebar-kasumi">❄️</div>
          <div>
            <div class="char-name">霞</div>
            <div class="char-status-text">…見てる</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <!-- Home -->
      <div id="view-home" class="view">
        <div class="timeline-header"><h1>ホーム</h1></div>
        <div class="compose-box">
          <div class="compose-avatar user-avatar" id="compose-avatar">👤</div>
          <form id="post-form" class="compose-form">
            <textarea id="post-textarea" placeholder="いまどうしてる？" maxlength="280" rows="2"></textarea>
            <div id="media-preview" class="media-preview-container"></div>
            <div class="compose-actions">
              <div class="compose-media">
                <label for="media-input" class="media-btn">🖼️</label>
                <input type="file" id="media-input" accept="image/*,video/*" style="display:none">
              </div>
              <div class="compose-footer">
                <span id="char-count" class="char-count">0/280</span>
                <button type="submit" id="post-submit" class="submit-btn" disabled>呟く</button>
              </div>
            </div>
          </form>
        </div>
        <div class="timeline-divider"></div>
        <div id="timeline" class="timeline"></div>
      </div>

      <!-- Notifications -->
      <div id="view-notifs" class="view" hidden>
        <div class="timeline-header"><h1>通知</h1></div>
        <div id="notif-list" class="notif-list"></div>
      </div>

      <!-- Settings -->
      <div id="view-settings" class="view" hidden>
        <div class="timeline-header"><h1>プロフィール設定</h1></div>
        <div class="settings-body">
          <div class="settings-card">
            <div class="settings-card-title">あなたのアイコン</div>
            <div class="avatar-editor">
              <div class="avatar-preview-lg user-avatar" id="user-avatar-preview">👤</div>
              <div class="avatar-editor-right">
                <label for="user-avatar-input" class="upload-btn">画像を選ぶ</label>
                <input type="file" id="user-avatar-input" accept="image/*" style="display:none">
                <button class="remove-btn" id="user-avatar-remove">削除</button>
                <div class="name-field">
                  <label class="name-label">表示名</label>
                  <input type="text" id="user-display-name" placeholder="あなた" maxlength="20" class="name-input">
                </div>
              </div>
            </div>
          </div>
          <div class="settings-card">
            <div class="settings-card-title">薫のアイコン</div>
            <div class="avatar-editor">
              <div class="avatar-preview-lg kaoru-avatar" id="kaoru-avatar-preview">🌸</div>
              <div class="avatar-editor-right">
                <label for="kaoru-avatar-input" class="upload-btn">画像を選ぶ</label>
                <input type="file" id="kaoru-avatar-input" accept="image/*" style="display:none">
                <button class="remove-btn" id="kaoru-avatar-remove">削除</button>
              </div>
            </div>
          </div>
          <div class="settings-card">
            <div class="settings-card-title">霞のアイコン</div>
            <div class="avatar-editor">
              <div class="avatar-preview-lg kasumi-avatar" id="kasumi-avatar-preview">❄️</div>
              <div class="avatar-editor-right">
                <label for="kasumi-avatar-input" class="upload-btn">画像を選ぶ</label>
                <input type="file" id="kasumi-avatar-input" accept="image/*" style="display:none">
                <button class="remove-btn" id="kasumi-avatar-remove">削除</button>
              </div>
            </div>
          </div>
          <button class="save-settings-btn" id="settings-save">保存する ✓</button>
        </div>
      </div>
    </main>
  </div>

  <!-- Reply Modal -->
  <div id="reply-modal" class="modal hidden">
    <div class="modal-backdrop" id="reply-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-toolbar">
        <button class="modal-close-btn" id="reply-close">✕</button>
        <span class="modal-toolbar-title">返信</span>
        <button class="submit-btn modal-submit-btn" id="reply-submit" disabled>返信する</button>
      </div>
      <div id="reply-parent" class="reply-parent"></div>
      <div class="reply-compose-row">
        <div class="avatar user-avatar" id="reply-avatar">👤</div>
        <div class="reply-compose-right">
          <textarea id="reply-textarea" placeholder="返信を入力…" maxlength="280"></textarea>
          <span id="reply-char-count" class="char-count">0/280</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="bottom-nav">
    <a href="#" class="bottom-item active" data-view="home">
      <span>🏠</span>
      <span class="bottom-label">ホーム</span>
    </a>
    <a href="#" class="bottom-item" data-view="notifs">
      <span class="nav-icon-cell">
        <span>🔔</span>
        <span class="nav-badge" id="notif-badge-mobile" style="display:none"></span>
      </span>
      <span class="bottom-label">通知</span>
    </a>
    <a href="#" class="bottom-item" data-view="settings">
      <span>⚙️</span>
      <span class="bottom-label">設定</span>
    </a>
  </nav>

  <div id="notifications" class="notifications-container"></div>

  <script src="js/storage.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/notifList.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/reactions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
